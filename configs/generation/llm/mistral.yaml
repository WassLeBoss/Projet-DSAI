# Mistral 7B Instruct + LoRA — GPU requis
name: mistral
model_id: mistralai/Mistral-7B-Instruct-v0.2
use_lora: true
quantize_4bit: true

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [q_proj, v_proj]

# Generation
max_new_tokens: 300
temperature: 0.85
top_p: 0.9
do_sample: true
repetition_penalty: 1.1

# Fine-tuning
num_train_epochs: 2
batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2e-4
max_input_length: 1024
