# ── GPT-2 Small — CPU-friendly ──────────────────────────
name: gpt2
model_id: gpt2              # HuggingFace model ID
use_lora: false             # LoRA non necessaire pour GPT-2 small

# Generation
max_new_tokens: 250
temperature: 0.9
top_p: 0.95
do_sample: true
repetition_penalty: 1.2

# Fine-tuning
num_train_epochs: 3
batch_size: 4
learning_rate: 5e-5
max_input_length: 512
